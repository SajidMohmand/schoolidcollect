name: school_id_collect
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  smooth_page_indicator: ^2.0.1
  flutter_custom_clippers: ^2.1.0
  image_picker: ^1.2.3
  qr_flutter: ^4.1.0
  barcode_widget: ^2.0.4
  font_awesome_flutter: ^11.0.0
  shared_preferences: ^2.5.5
  pdf: ^3.13.0
  printing: ^5.15.0
  path_provider: ^2.1.6
  screenshot: ^3.0.0

  share_plus: ^13.2.0
  flutter_email_sender: ^10.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21


flutter:

  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/icon/
    - assets/images/



